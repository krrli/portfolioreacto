<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <title>Carla Land</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: "Blenny";
      src: url("./assets/Blenny_Trial_Blk.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, #f2f2f3 0%, #e8e8ea 100%);
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #111;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.04"/></svg>');
      opacity: 0.25;
    }

    .clouds {
      position: relative;
      width: min(90vmin, 640px);
      height: min(90vmin, 640px);
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.08));
      transform: translateY(-4%);
    }

    /* CLOUDS */
    .cloud {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 45% 55% 50% 50% / 55% 45% 55% 45%;
      opacity: 0.8;
      animation: drift 14s ease-in-out infinite alternate;
    }

    .cloud.orange {
      background: rgba(255, 85, 0, 0.92);
      border-radius: 62% 38% 55% 45% / 44% 66% 34% 56%;
      z-index: 1;
      transform: rotate(-38deg) translate(-12%, 6%);
      animation:
        driftOrange 22s ease-in-out infinite alternate,
        breathe 9s ease-in-out infinite;
      width: 105%;
    }

    .cloud.purple {
      background: #cdb8fa;
      border-radius: 40% 60% 48% 52% / 58% 42% 63% 37%;
      z-index: 2;
      transform: rotate(18deg) translate(14%, -8%);
      animation:
        driftPurple 14s ease-in-out infinite alternate,
        breathe 11s ease-in-out infinite;
      height: 106%;
    }

    /* PORTRAIT */
    .cloud-portrait {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.8);
      transition:
        opacity 0.5s ease-out,
        transform 0.5s ease-out;
      z-index: 10;
      pointer-events: none;
    }

    /* CURVED EMAIL */
    .mail-arc {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity 0.4s ease-out;
    }

    .mail-arc text {
      pointer-events: auto;
      cursor: pointer;
    }

    /* TEXT */
    .text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 3;
      pointer-events: none;
      color: #ffffff;
    }

    .subline {
      font-family: 'Blenny', sans-serif;
      font-size: clamp(2.8rem, 5vw, 4rem);
      letter-spacing: 0.4px;
      font-weight: 400;
      animation: rotateText 3s ease-in-out infinite alternate;
      pointer-events: auto;
      cursor: url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48'>\
  <text y='32' font-size='32'>✨</text>\
</svg>"
        ) 16 16, auto;
    }

    /* SPARKLES OFF AFTER CLICK */
    .subline.no-sparkles:hover::before,
    .subline.no-sparkles:hover::after {
      opacity: 0 !important;
      animation: none !important;
      content: none !important;
    }

    /* ANIMATIONS */
    @keyframes driftOrange {
      from {
        transform: rotate(-38deg) translate(0, 0) scale(1);
      }

      to {
        transform: rotate(-38deg) translate(-8%, 6%) scale(1.04);
      }
    }

    @keyframes driftPurple {
      from {
        transform: rotate(12deg) translate(0, 0) scale(1);
      }

      to {
        transform: rotate(12deg) translate(10%, -4%) scale(1.06);
      }
    }

    @keyframes breathe {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.015);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(6%, -6%) scale(1.05);
      }
    }

    @keyframes rotateText {
      0% {
        transform: rotate(-1deg);
      }

      50% {
        transform: rotate(1deg);
      }

      100% {
        transform: rotate(-1deg);
      }
    }
  </style>
</head>

<body>
  <div class="clouds">
    <div class="cloud orange"></div>
    <div class="cloud purple"></div>

    <img class="cloud-portrait" src="./assets/karli-quadrat.jpg" />

    <svg class="mail-arc" viewBox="0 0 200 200">
      <defs>
        <g id="rotatedPath" transform="rotate(38, 100, 100)">
          <path id="mailPath" d="M 100,100
           m -82,0
           a 82,82 0 1,1 164,0
           a 82,82 0 1,1 -164,0" />
        </g>
      </defs>

      <text font-size="11" fill="#222" letter-spacing="1.2" font-family="Space Grotesk, sans-serif">
        <textPath href="#mailPath" startOffset="0.05%">
          hoi@carla.land
        </textPath>
      </text>
    </svg>

    <div class="text">
      <div class="subline">Bald mehr.</div>
    </div>
  </div>

  <script>
    const subline = document.querySelector(".subline");
    const portrait = document.querySelector(".cloud-portrait");
    const mailArc = document.querySelector(".mail-arc");
    const textPath = mailArc.querySelector("textPath");

    subline.addEventListener("click", () => {
      subline.classList.add("no-sparkles");

      // Portrait rein + pointer events aktivieren
      portrait.style.opacity = "1";
      portrait.style.transform = "translate(-50%, -50%) scale(1)";
      portrait.style.pointerEvents = "auto";

      // Mail rein
      mailArc.style.opacity = "1";

      // Alles wieder raus
      setTimeout(() => {
        portrait.style.opacity = "0";
        portrait.style.transform = "translate(-50%, -45%) scale(0.8)";
        mailArc.style.opacity = "0";

        // Portrait wieder durchklickbar machen
        portrait.style.pointerEvents = "none";

        // Sparkles erst NACH dem Ausblenden wieder aktivieren
        setTimeout(() => {
          subline.classList.remove("no-sparkles");
        }, 500);
      }, 1600);
    });
    mailArc.addEventListener("click", () => {
      navigator.clipboard.writeText("hoi@carla.land");

      const original = textPath.textContent;
      textPath.textContent = "copied!";

      setTimeout(() => {
        textPath.textContent = original;
      }, 800);

    });
  </script>
</body>

</html>
